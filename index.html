<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jing Li</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="title">Jing Li</h1>
    <div id="navi">
      <a href="index.html"><button class="navi-button" title="Homepage">Home</button></a>
      <a href="intro.html"><button class="navi-button" title="Information about me">Introduction</button></a>
      <a href="qualifications.html"><button class="navi-button" title="My qualifications">Qualifications</button></a>
      <a href="projects.html"><button class="navi-button" title="My works">Projects</button></a>
      <a href="contact.html"><button class="navi-button" title="Click here to contact me">Contact</button></a>
    </div>

  <div class="divA">
    <div class="divB">
      <div class="divC">
        <h2 id="sayHi">Hello! I'm Jing. Welcome to my homepage! I'm currently working on it.</h2>
      </div>
      <div class="divC">
        <button id="like" onclick="likePage()">Like Page</button>
        <p id="likes"></p>
      </div>
    </div>

    <div class="divB">
      <div class="divC imgContainer">
        <img src="photos/meA.jpg" class="imgItems">
        <img src="photos/meB.jpg" class="imgItems">
        <img src="photos/meC.jpg" class="imgItems">      
      </div>
      <div class="divC" id="messageContainer">
        <form>
          <label for="message"><h3>Leave me a short message :-)</h3></label>
          <input id="message" placeholder="What do you want to say?">
          <input type="submit" id="submit" onclick="alert('Thank you!')">
        </form>
      </div>
    </div>
  </div>
  <div class="divA">
    <p>Feel free to explore my page! Let's start with a Rock Paper Scissors game. Click to choose:</p>
    <button onclick="playGame('rock')" class="gameButton">Rock</button>
    <button onclick="playGame('paper')" class="gameButton">Paper</button>
    <button onclick="playGame('scissors')" class="gameButton">Scissor</button>
  </div>


  <footer></footer>
  <script>
    let like = 0;
    function likePage(){
      like++; 
      alert(`You've send ${like} likes. Thanks!`)
    }

    const myChoice = computerChoice();
  
    function computerChoice(){
      let randomNum = 0;
      let randomChoice = '';
    
      randomNum = Math.random();
      if(randomNum > 0 && randomNum <= 1/3){
        randomChoice = 'rock';
      } else if(randomNum > 1/3 && randomNum <= 2/3){
        randomChoice = 'paper';
      } else if(randomNum > 2/3 && randomNum < 1){
        randomChoice = 'scissors';
      }
      return randomChoice;
    }

    function playGame(yourChoice) {
      let result = '';
      if (myChoice === 'rock'){
        if(yourChoice === 'rock'){
          result = 'Tie';
        } else if(yourChoice === 'paper'){
          result = 'You win!';
        } else{
          result = 'You loose.';
        }
      } else if (myChoice === 'paper'){
        if(yourChoice === 'paper'){
          result = 'Tie';
        } else if(yourChoice === 'scissors'){
          result = 'You win!';
        } else{
          result = 'You loose.';
        }
      } else if (myChoice === 'scissors'){
        if(yourChoice === 'scissors'){
          result = 'Tie';
        } else if(yourChoice === 'rock'){
          result = 'You win!';
        } else{
          result = 'You loose.';
        }
      }
      alert(`You chose ${yourChoice}, I chose ${myChoice}, ${result}`);
    }
 
  </script>
</body>
</html>
